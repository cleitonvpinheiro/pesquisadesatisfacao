<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Completo - Refeitório</title>
  <link rel="stylesheet" href="./dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <div class="container">
    <h1>Dashboard - Avaliações do Refeitório</h1>

    <div class="graficos">
      <div class="card">
        <h3>Classificação Geral</h3>
        <canvas id="graficoClassificacao"></canvas>
      </div>

      <div class="card">
        <h3>Distribuição por Nota Geral</h3>
        <canvas id="graficoNotas"></canvas>
      </div>
    </div>

    <div class="filtros">
      <div>
        <label for="tipoFiltro">Classificação:</label>
        <select id="tipoFiltro">
          <option value="">Todos</option>
          <option value="Excelente">Excelente</option>
          <option value="Bom">Bom</option>
          <option value="Ruim">Ruim</option>
        </select>
      </div>

      <div>
        <label for="notaFiltro">Nota:</label>
        <select id="notaFiltro">
          <option value="">Todas</option>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>

      <div>
        <label for="dataFiltro">Data:</label>
        <input type="date" id="dataFiltro">
      </div>

      <div>
        <button id="btnFiltrar">Filtrar</button>
        <button id="btnLimpar">Limpar</button>
        <button id="btnExportar" class="btn-primary">Exportar Excel</button>
      </div>
    </div>

    <h2>Sugestões</h2>
    <ul id="lista-sugestoes"></ul>

    <div class="resumo">
      <p>Total de respostas: <span id="total-geral">0</span></p>
      <p>Média da nota geral: <span id="media-nota">0</span></p>
    </div>
  </div>

  <script>
    // Inicializa autenticação antes de carregar o dashboard
    document.addEventListener('DOMContentLoaded', function() {
      // Mostra loading enquanto verifica autenticação
      document.body.innerHTML = '<div class="loading">Verificando autenticação...</div>';
      
      initAuth().then(isAuthenticated => {
        if (isAuthenticated) {
          // Restaura o conteúdo original e carrega o dashboard
          document.body.innerHTML = `
            <div class="container">
              <h1>Dashboard - Avaliações do Refeitório</h1>

              <div class="graficos">
                <div class="card">
                  <h3>Classificação Geral</h3>
                  <canvas id="graficoClassificacao"></canvas>
                </div>

                <div class="card">
                  <h3>Distribuição por Nota Geral</h3>
                  <canvas id="graficoNotas"></canvas>
                </div>
              </div>

              <div class="filtros">
                <div>
                  <label for="tipoFiltro">Classificação:</label>
                  <select id="tipoFiltro">
                    <option value="">Todos</option>
                    <option value="Excelente">Excelente</option>
                    <option value="Bom">Bom</option>
                    <option value="Ruim">Ruim</option>
                  </select>
                </div>

                <div>
                  <label for="notaFiltro">Nota:</label>
                  <select id="notaFiltro">
                    <option value="">Todas</option>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                  </select>
                </div>

                <div>
                  <label for="dataFiltro">Data:</label>
                  <input type="date" id="dataFiltro">
                </div>

                <div>
                  <button id="btnFiltrar">Filtrar</button>
                  <button id="btnLimpar">Limpar</button>
                  <button id="btnExportar" class="btn-primary">Exportar Excel</button>
                </div>
              </div>

              <h2>Sugestões</h2>
              <ul id="lista-sugestoes"></ul>

              <div class="resumo">
                <p>Total de respostas: <span id="total-geral">0</span></p>
                <p>Média da nota geral: <span id="media-nota">0</span></p>
              </div>
            </div>
          `;
          
          // Adiciona informações do usuário
          displayUserInfo();
          addLogoutButton();
          
          // Carrega o script do dashboard
          const script = document.createElement('script');
          script.src = './dashboard.js';
          document.head.appendChild(script);
        }
      }).catch(error => {
        console.error('Erro na inicialização:', error);
        window.location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
