<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard Refeitório</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="assets/logo.png">
    <script src="translations.js"></script>
</head>

<body>
    <div class="top-controls">
        <div class="control-pill">
            <div class="language-toggle-group">
                 <button type="button" class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')" title="Português">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="22" height="16"><rect width="22" height="16" fill="#009c3b"/><path d="M11 2L19 8L11 14L3 8Z" fill="#ffdf00"/><circle cx="11" cy="8" r="3.5" fill="#002776"/><path d="M9 8.5C9 8.5 10 9.5 13 8" stroke="#fff" stroke-width="0.5" fill="none"/></svg>
                 </button>
                 <button type="button" class="lang-btn" data-lang="en" onclick="changeLanguage('en')" title="English">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="22" height="16"><rect width="22" height="16" fill="#b22234"/><path d="M0 2H22M0 6H22M0 10H22M0 14H22" stroke="#fff" stroke-width="2"/><rect width="10" height="9" fill="#3c3b6e"/><path d="M1 1.5h8M1 4.5h8M1 7.5h8" stroke="#fff" stroke-width="0.5" stroke-dasharray="1 1" opacity="0.5"/></svg>
                 </button>
                 <button type="button" class="lang-btn" data-lang="es" onclick="changeLanguage('es')" title="Español">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="22" height="16"><rect width="22" height="16" fill="#AA151B"/><rect y="4" width="22" height="8" fill="#F1BF00"/></svg>
                 </button>
            </div>
            <div class="divider"></div>
            <button id="darkModeToggle" class="btn-icon" title="Alternar Modo Escuro" aria-label="Modo Escuro">
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </div>

    <div class="container">
        
        <div class="login-box">
            <div class="login-header">
                <img src="./assets/logo.png" alt="Logo Familia Madalosso">
                <h1 id="loginTitle" data-translate="loginTitle">Acesso ao Dashboard</h1>
                <p id="loginSubtitle" data-translate="loginSubtitle">Entre com suas credenciais para acessar o painel administrativo</p>
            </div>



            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username" id="usernameLabel" data-translate="username">Usuário:</label>
                    <input type="text" id="username" name="username" required placeholder="Digite seu usuário" data-translate-placeholder="usernamePlaceholder">
                </div>

                <div class="form-group">
                    <label for="password" id="passwordLabel" data-translate="password">Senha:</label>
                    <input type="password" id="password" name="password" required placeholder="Digite sua senha" data-translate-placeholder="passwordPlaceholder">
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-login" data-translate="loginButton">Entrar</button>
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>
            </form>

            <div class="login-footer">
                <p><span data-translate="backToSurvey">Voltar para a</span> <a href="index.html" data-translate="surveyLink">Pesquisa de Satisfação</a></p>
            </div>


        </div>
    </div>

    <script src="login.js"></script>
    <script>
      loadSavedLanguage();
      updatePageTexts();
    </script>
</body>

</html>
