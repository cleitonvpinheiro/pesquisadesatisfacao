<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset=" UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação - Refeitório</title>
    <link rel="stylesheet" href="from.css">
    <link rel="icon" href="assets/logo.png">
    <script src="translations.js"></script>
</head>

<body>
    <!-- Seletor de idioma (Mobile Style Pill) -->
    <div class="language-selector-pill">
        <button type="button" class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')">PT</button>
        <button type="button" class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</button>
        <button type="button" class="lang-btn" data-lang="es" onclick="changeLanguage('es')">ES</button>
    </div>

    <div class="container">
        <img src="./assets/logo.png" alt="Logo Familia Madalosso">
        <h2 data-translate="surveyTitle">Pesquisa satisfação - Refeitório</h2>

        <form id="formSatisfacao">
            <h3 data-translate="generalData">1. Dados Gerais</h3>
           <!--  <label for="horario">Horário:</label>
            <input type="text" id="horario" name="horario" required placeholder="Ex: 12:00"> -->
            <br>
            <label><input type="radio" name="horario" value="Café"><span data-translate="breakfast">Café</span></label>
            <label><input type="radio" name="horario" value="Almoço"><span data-translate="lunch">Almoço</span></label>
            <label><input type="radio" name="horario" value="Jantar"><span data-translate="dinner">Jantar</span></label><br>
            <small data-translate="scheduleHelp">(Horário que você costuma utilizar o refeitório)</small>
            <br><br>
            <h3 data-translate="aboutFood">2. Sobre a comida</h3>
            <label data-translate="mealQuality">Qualidade das refeições:</label><br>
            <div class="estrelas" data-pergunta="qualidade"></div><br>

            <label data-translate="mealVariety">Variedade das refeições:</label><br>
            <div class="estrelas" data-pergunta="variedade"></div><br>

            <label data-translate="foodTemperature">Temperatura dos alimentos:</label>
            <br>
            <div class="estrelas" data-pergunta="temperatura"></div><br>

            <label data-translate="menuNeeds">O cardápio atende às suas necessidades?</label>
            <br>
            <label><input type="radio" name="cardapio" value="Sim"><span data-translate="yes">Sim</span></label>
            <label><input type="radio" name="cardapio" value="Parcialmente"><span data-translate="partially">Parcialmente</span></label>
            <label><input type="radio" name="cardapio" value="Não"><span data-translate="no">Não</span></label>

            <br>
            <h3 data-translate="aboutEnvironment">3. Sobre o ambiente</h3>
            <label data-translate="cafeteriaClean">Limpeza do refeitório:</label><br>
            <div class="estrelas" data-pergunta="limpeza"></div><br>

            <label data-translate="comfortOrganization">Conforto e Organização (filas, mesas, bandejas, utensílios):</label><br>
            <div class="estrelas" data-pergunta="organizacao"></div><br>

            <label data-translate="waitingTime">Tempo de espera:</label><br>
            <label><input type="radio" name="espera" value="Rápido"><span data-translate="fast">Rápido</span></label>
            <label><input type="radio" name="espera" value="Razoável"><span data-translate="reasonable">Razoável</span></label>
            <label><input type="radio" name="espera" value="Demorado"><span data-translate="slow">Demorado</span></label><br>

            <label data-translate="overallRating">Nota geral do refeitório:</label>
          <select name="notaGeral" data-pergunta="notaGeral" id="notaGeral">
            <option value="" data-translate="select">Selecione</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
          <div id="classificacao-nota" class="classificacao-feedback"></div>
            
            <h3 data-translate="suggestions">5. Sugestões</h3>

            <textarea name="sugestao" data-translate-placeholder="suggestionsPlaceholder" placeholder="O que você gostaria de ver de diferente?"></textarea>

            <button type="submit" class="btn-enviar" data-translate="submit">Enviar</button>
        </form>
        <footer class="app-footer">Desenvolvido por Família Madalosso - Excelência em servir.</footer>
    </div>

    <script src="questionario.js"></script>

</body>

</html>
