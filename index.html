<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="caminho/para/seu/favicon.ico">
    <script src="translations.js"></script>
</head>
<body>

    <div class="container">
        <!-- Seletor de idioma -->
        <div class="language-selector">
            <label for="languageSelect" data-translate="language">Idioma</label>
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="pt" data-translate="portuguese">Português</option>
                <option value="en" data-translate="english">English</option>
                <option value="es" data-translate="spanish">Español</option>
            </select>
        </div>
        
        <h1 data-translate="mainTitle">Avalie nosso Refeitório</h1>

        <div class="options">
            <button type="button" class="btn excelente" data-value="excelente">
                😊 <span data-translate="excellent">Excelente</span>
            </button>
            <button type="button" class="btn bom" data-value="bom">
                😃 <span data-translate="good">Bom</span>
            </button>
            <button type="button" class="btn ruim" data-value="ruim">
                😞 <span data-translate="bad">Ruim</span>
            </button>
        </div>

        <button type="button" id="enviar" class="btn enviar" data-translate="answerSurvey">Responder Pesquisa</button> <br>

        <!-- <p id="mensagem" class="mensagem"></p>

        <p style="text-align: center; margin-top: 20px;">
            <a href="formulario-refeitorio.html" style="color: #007bff; text-decoration: none;"></a>
        </p> -->
    </div>
    
    <script src="satisfacao.js"></script>

</body>
</html>
