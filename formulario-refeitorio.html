<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação - Refeitório</title>
    <link rel="stylesheet" href="from.css">
    <link rel="icon" href="assets/logo.png">
    <script src="translations.js"></script>
</head>

<body>
    <!-- Seletor de idioma (Mobile Style Pill) -->
    <div class="language-selector-pill">
         <button type="button" class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')" title="Português">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="22" height="16"><rect width="22" height="16" fill="#009c3b"/><path d="M11 2L19 8L11 14L3 8Z" fill="#ffdf00"/><circle cx="11" cy="8" r="3.5" fill="#002776"/><path d="M9 8.5C9 8.5 10 9.5 13 8" stroke="#fff" stroke-width="0.5" fill="none"/></svg>
         </button>
         <button type="button" class="lang-btn" data-lang="en" onclick="changeLanguage('en')" title="English">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="22" height="16"><rect width="22" height="16" fill="#b22234"/><path d="M0 2H22M0 6H22M0 10H22M0 14H22" stroke="#fff" stroke-width="2"/><rect width="10" height="9" fill="#3c3b6e"/><path d="M1 1.5h8M1 4.5h8M1 7.5h8" stroke="#fff" stroke-width="0.5" stroke-dasharray="1 1" opacity="0.5"/></svg>
         </button>
         <button type="button" class="lang-btn" data-lang="es" onclick="changeLanguage('es')" title="Español">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="22" height="16"><rect width="22" height="16" fill="#AA151B"/><rect y="4" width="22" height="8" fill="#F1BF00"/></svg>
         </button>
    </div>

    <div class="container">
        <img src="./assets/logo.png" alt="Logo Familia Madalosso">
        <h2 data-translate="surveyTitle">Pesquisa satisfação - Refeitório</h2>

        <form id="formSatisfacao">
            <h3 data-translate="generalData">1. Dados Gerais</h3>
            
            <!-- Dynamic Questions Container -->
            <div id="questions-container">
                <!-- Perguntas serão carregadas aqui via JavaScript -->
                <p style="text-align: center; color: #666;">Carregando perguntas...</p>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <label data-translate="overallRating" style="font-weight: bold; display: block; margin-bottom: 10px;">Nota geral do refeitório:</label>
            <select name="notaGeral" data-pergunta="notaGeral" id="notaGeral" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="" data-translate="select">Selecione</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
            <div id="classificacao-nota" class="classificacao-feedback"></div>
            
            <h3 data-translate="suggestions" style="margin-top: 20px;">5. Sugestões</h3>

            <textarea name="sugestao" data-translate-placeholder="suggestionsPlaceholder" placeholder="O que você gostaria de ver de diferente?" style="width: 100%; height: 100px; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; resize: vertical;"></textarea>

            <button type="submit" class="btn-enviar" data-translate="submit">Enviar</button>
        </form>
    </div>

    <script src="questionario.js"></script>

</body>
</html>
